name: Push to DockerHub

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  REPOSITORY_URL: registry.hub.docker.com
  IMAGE_NAME: alerta/alerta-web

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Docker Lint
        id: docker-lint
        run: |
          docker run --rm -i ghcr.io/hadolint/hadolint hadolint \
          --ignore DL3008 \
          --ignore DL3059 \
          - < Dockerfile
      - name: Run tests
        id: smoketest
        run: >-
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RELEASE=$(cat VERSION)
          VERSION=${{ github.sha }}
          docker compose
          -f tests/docker-compose.test.mongodb.yml
          up
          --build
          --quiet-pull
          --exit-code-from tester
      - uses: act10ns/slack@v2.1.0
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REPOSITORY_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set build metadata
        id: meta
        run: |
          echo "RELEASE=$(cat VERSION)" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "PLATFORM_TAG=$(echo ${{ matrix.platform }} | tr '/' '-')" >> $GITHUB_OUTPUT
      - name: Build and Push
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.BUILD_DATE }}
            RELEASE=${{ steps.meta.outputs.RELEASE }}
            VERSION=${{ steps.meta.outputs.SHORT_SHA }}
          tags: |
            ${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.RELEASE }}-${{ steps.meta.outputs.PLATFORM_TAG }}

      - uses: act10ns/slack@v2.1.0
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  manifest:
    name: Create Manifest
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set build metadata
        id: meta
        run: |
          echo "RELEASE=$(cat VERSION)" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REPOSITORY_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push manifest
        run: |
          RELEASE=${{ steps.meta.outputs.RELEASE }}
          SHORT_SHA=${{ steps.meta.outputs.SHORT_SHA }}
          REPO=${{ env.REPOSITORY_URL }}/${{ env.IMAGE_NAME }}

          for TAG in "${RELEASE}" "${SHORT_SHA}" "latest"; do
            docker buildx imagetools create -t ${REPO}:${TAG} \
              ${REPO}:${RELEASE}-linux-amd64 \
              ${REPO}:${RELEASE}-linux-arm64
          done
      - name: Clean up platform tags
        run: |
          echo "Platform-specific tags can be cleaned up manually if desired"

      - uses: act10ns/slack@v2.1.0
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: always()
